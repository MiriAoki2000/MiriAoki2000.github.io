# Welcome to Jekyll!
# Restart jekyll serve after editing this file.

# Basic Site Settings
locale               : "en-US"
site_theme           : "default"

# Important:
# Keep site.title descriptive but NOT your full name.
# Let the homepage/page title be "Miri Aoki" so the full title becomes:
# "Miri Aoki | Political Economist | IDE-JETRO"
title: "Political Economist | IDE-JETRO"
name: "Miri Aoki"
title_separator: "|"
description          : &description "Miri Aoki is a political economist and Research Fellow at IDE-JETRO. Her research focuses on political economy, development economics, Taiwan, and East and Southeast Asia."

url                  : "https://miriaoki2000.github.io"
baseurl              : ""
repository           : "MiriAoki2000/MiriAoki2000.github.io"

# Optional visual settings
teaser               :
logo                 :
masthead_title       : "Miri Aoki"

# Site Author
author:
  avatar             : "199042.png"
  name               : "Miri Aoki"
  bio                : "Research Fellow at IDE-JETRO. Political Economics / Development Economics / Taiwanese Economy"
  employer           : "Institute of Developing Economies (IDE-JETRO)"
  uri                : "https://www.ide.go.jp/English/Researchers/aoki_miri_en.html"
  email              : "Miri_Aoki@ide.go.jp"

  # Academic websites
  # googlescholar    : "PASTE_YOUR_GOOGLE_SCHOLAR_URL_HERE"
  # orcid            : "PASTE_YOUR_ORCID_URL_HERE"
  # semantic         : "PASTE_YOUR_SEMANTIC_SCHOLAR_URL_HERE"
  # researchgate     : "PASTE_YOUR_RESEARCHGATE_URL_HERE"
  # scopus           : "PASTE_YOUR_SCOPUS_URL_HERE"

  # Repositories and software development
  github             : "MiriAoki2000"

  # Social media
  linkedin           : "miri-aoki"

# Publication Category
publication_category:
  books              : "Books"
  manuscripts        : "Journal Articles"
  conferences        : "Conference Papers"

# Site Settings
breadcrumbs          : false
words_per_minute     : 160
future               : false
read_more            : "disabled"
talkmap_link         : false

comments:
  provider           :
  disqus:
    shortname        :
  discourse:
    server           :
  facebook:
    appid            :
    num_posts        :
    colorscheme      :

staticman:
  allowedFields      : ['name', 'email', 'url', 'message']
  branch             : "master"
  commitMessage      : "New comment."
  filename           : comment-{@timestamp}
  format             : "yml"
  moderation         : true
  path               : "_data/comments/{options.slug}"
  requiredFields     : ['name', 'email', 'message']
  transforms:
    email            : "md5"
  generatedFields:
    date:
      type           : "date"
      options:
        format       : "iso8601"

atom_feed:
  hide               : false
  path               :

# SEO / verification
google_site_verification : "c16xTi4E1BrqsJt-XgqcOau11c1YvFvVmriQP4sIDGw"
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# Social sharing
twitter:
  username           :
facebook:
  username           :
  app_id             :
  publisher          :

# Default social image for sharing cards
# Set this if you have a good portrait or banner image in /images/
og_image             : "/images/199042.png"

# Structured data / identity signals
social:
  type               : "Person"
  name               : "Miri Aoki"
  links:
    - "https://miriaoki2000.github.io"
    - "https://github.com/MiriAoki2000"
    - "https://www.ide.go.jp/English/Researchers/aoki_miri_en.html"
    - "https://www.linkedin.com/in/miri-aoki/"

# Analytics
analytics:
  provider           : false
  google:
    tracking_id      :

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main._

# Keep assets out of sitemap
defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
